# ── HTTP : redirige vers HTTPS + challenge Let's Encrypt ─────────────────────
server {
    listen 80;
    server_name VOTRE_DOMAINE.fr;

    # Nécessaire pour la génération du certificat Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name VOTRE_DOMAINE.fr;

    ssl_certificate     /etc/letsencrypt/live/VOTRE_DOMAINE.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/VOTRE_DOMAINE.fr/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # ── API FastAPI ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Images uploadées (servies directement par nginx) ──────────────────────
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
    }

    # ── Frontend React ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
