    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    server_tokens off;

    location / {
        proxy_pass         http://pgadmin/;
        proxy_set_header   X-Script-Name /;
        proxy_set_header   X-Scheme $scheme;
        proxy_set_header   Host $host;
        proxy_redirect     off;
    }
}
