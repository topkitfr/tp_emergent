limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;

# CORS headers sur les erreurs (notamment 429)
map $status $cors_header {
    default "https://topkit.app";
}

server {
    listen 80;
    server_name topkit.app www.topkit.app api.topkit.app media.topkit.app git.topkit.app db.topkit.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name topkit.app www.topkit.app;

    ssl_certificate     /etc/letsencrypt/live/topkit.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/topkit.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    client_max_body_size 50M;

    resolver 127.0.0.11 valid=10s;

    location ^~ /api/images/ {
        alias /mnt/Freebox-1/TP_media/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    location /uploads/ {
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend/uploads/;
    }

    location /api/ {
        limit_req zone=api burst=40 nodelay;
        limit_req_status 429;

        add_header Access-Control-Allow-Origin "https://topkit.app" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://topkit.app" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Content-Length 0;
            return 204;
        }

        set $upstream_backend http://backend:8000;
        proxy_pass         $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    location / {
        limit_req zone=general burst=60 nodelay;
        limit_req_status 429;

        proxy_pass         http://frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

