server {
    listen 80;
    server_name topkit.app www.topkit.app api.topkit.app git.topkit.app db.topkit.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name topkit.app www.topkit.app;

    ssl_certificate     /etc/letsencrypt/live/topkit.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/topkit.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location /api/images/ {
        alias /mnt/Freebox-1/TP_media/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
    }

    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
    }
location /api/ {
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
}
    location / {
        proxy_pass         http://frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.topkit.app;

    ssl_certificate     /etc/letsencrypt/live/topkit.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/topkit.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

server {
    listen 443 ssl;
    server_name git.topkit.app;

    ssl_certificate     /etc/letsencrypt/live/topkit.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/topkit.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://gitea:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name db.topkit.app;

    ssl_certificate     /etc/letsencrypt/live/topkit.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/topkit.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://pgadmin/;
        proxy_set_header   X-Script-Name /;
        proxy_set_header   X-Scheme $scheme;
        proxy_set_header   Host $host;
        proxy_redirect     off;
    }
}
