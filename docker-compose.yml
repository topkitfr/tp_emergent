services:

  # ── API FastAPI ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.backend
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8000"

  # ── Receiver Freebox (upload images) ────────────────────────────────────────
  receiver:
    build:
      context: ./receiver
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8001"
    volumes:
      - /mnt/Freebox-1/TP_media:/mnt/Freebox-1/TP_media
    env_file:
      - .env.backend

  # ── Frontend React ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: https://api.topkit.app
        REACT_APP_API_URL: https://api.topkit.app/api
    restart: always
    expose:
      - "80"

  # ── Reverse proxy + HTTPS ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
      - /mnt/Freebox-1/TP_media:/mnt/Freebox-1/TP_media:ro
    depends_on:
      - frontend
      - backend

  # ── Gitea ─────────────────────────────────────────────────────────────────────
  gitea:
    image: gitea/gitea:latest
    restart: always
    expose:
      - "3000"
    volumes:
      - gitea_data:/data

  # ── Certificat Let's Encrypt ─────────────────────────────────────────────────
  # Boucle de renouvellement permanente (toutes les 12h). Le cert initial doit
  # déjà exister dans le volume certbot_certs ; ce service ne fait que `renew`.
  # nginx récupère le nouveau cert au prochain restart (CD le fait à chaque push).
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  uploads_data:
  certbot_certs:
  certbot_www:
  gitea_data:
