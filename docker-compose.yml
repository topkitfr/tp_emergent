services:

  # ── API FastAPI ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.backend
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8000"

  # ── Frontend React ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: https://api.topkit.app
        REACT_APP_API_URL: https://api.topkit.app/api
    restart: always
    expose:
      - "80"

  # ── Reverse proxy + HTTPS ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
      - /mnt/Freebox-1/TP_media:/mnt/Freebox-1/TP_media:ro
    depends_on:
      - frontend
      - backend

  # ── Gitea ─────────────────────────────────────────────────────────────────────
  gitea:
    image: gitea/gitea:latest
    restart: always
    expose:
      - "3000"
    volumes:
      - gitea_data:/data

  # ── pgAdmin ───────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    expose:
      - "80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@topkit.app"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD}"

  # ── Certificat Let's Encrypt ─────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  uploads_data:
  certbot_certs:
  certbot_www:
  gitea_data:
