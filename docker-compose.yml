services:

  # ── API FastAPI ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.backend
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8000"

  # ── Frontend React ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: https://topkit.app
        REACT_APP_API_URL: https://topkit.app/api
    restart: always
    expose:
      - "80"

  # ── Reverse proxy + HTTPS ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend

  # ── Certificat Let's Encrypt ─────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  uploads_data:
  certbot_certs:
  certbot_www:
