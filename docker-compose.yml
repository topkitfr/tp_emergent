services:

  # ── Base de données ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}

  # ── API FastAPI ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - mongodb
    env_file:
      - .env.backend
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8000"

  # ── Frontend React ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: https://topkit.app
        REACT_APP_API_URL: https://topkit.app/api
    restart: always
    expose:
      - "80"

  # ── Reverse proxy + HTTPS ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend

  # ── Certificat Let's Encrypt ─────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  mongo_data:
  uploads_data:
  certbot_certs:
  certbot_www:
