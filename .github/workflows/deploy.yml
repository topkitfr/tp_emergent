name: Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/topkitfr/tp_emergent

jobs:
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest
          build-args: |
            REACT_APP_BACKEND_URL=https://${{ secrets.DOMAIN }}
            REACT_APP_API_URL=https://${{ secrets.DOMAIN }}/api

  deploy:
    name: Deploy sur NAS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOMAIN }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          script: |
            cd /home/freebox/topkit

            # Pull les nouvelles images
            docker compose pull

            # Redémarre les services mis à jour
            docker compose up -d --remove-orphans

            # Nettoie les anciennes images
            docker image prune -f
