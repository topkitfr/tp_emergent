name: Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/topkitfr/tp_emergent

jobs:
  # ─── Filet de sécurité — bloque build + deploy si rouge ──────────────────
  tests:
    name: Tests (backend pytest + frontend build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Backend : pytest ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend deps
        run: pip install -r backend/requirements-dev.txt

      - name: Run pytest
        env:
          # Le backend lève une RuntimeError au boot si ces vars sont absentes/mauvaises
          ENVIRONMENT: test
          MONGO_URL: mongodb://test/
          DB_NAME: topkit_test
          RECEIVER_SECRET: ci-secret-not-changeme
        run: pytest --tb=short

      # ─── Frontend : build CRA (catch les imports cassés) ─────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://api.topkit.app
          REACT_APP_API_URL: https://api.topkit.app/api
          CI: "false"  # CRA traite les warnings comme erreurs avec CI=true
        run: npm run build

  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest
          build-args: |
            REACT_APP_BACKEND_URL=https://${{ secrets.DOMAIN }}
            REACT_APP_API_URL=https://${{ secrets.DOMAIN }}/api

  deploy:
    name: Deploy sur NAS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOMAIN }}
          port: 22222
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          # Stratégie : pull du dernier main puis rebuild local des services.
          # Le compose actuel utilise `build:` (pas `image:`), donc un simple
          # `docker compose pull` ne ferait rien — on rebuild explicitement.
          script: |
            set -e
            cd /home/tp_admin/delta

            git fetch origin
            git reset --hard origin/main

            docker compose up -d --build --remove-orphans

            docker image prune -f
