[pytest]
# Lancement : pytest (depuis la racine du repo)
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-asyncio : tous les tests async sans avoir à décorer la fixture
asyncio_mode = auto

# Logs lisibles si un test échoue
log_cli = true
log_cli_level = WARNING

# Filtrer les DeprecationWarnings de tiers (asyncio loop policy, multipart…)
# pour garder le terminal lisible. Les warnings de NOTRE code restent visibles.
filterwarnings =
    ignore::DeprecationWarning:asyncio
    ignore::DeprecationWarning:pytest_asyncio
    ignore::DeprecationWarning:starlette
    ignore::DeprecationWarning:httpx
    ignore::PendingDeprecationWarning:starlette
    ignore::DeprecationWarning:fastapi.applications
